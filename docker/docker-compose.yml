services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: heart-monitor-backend
    environment:
      - PYTHONUNBUFFERED=1
    image: ghcr.io/zawarudo87/home_wearable_heart_disease_monitoring_device:latest
    networks:
      - heart-monitor-network
    ports:
      - "39244:39244"
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./data:/app/backend/data

  ecg-receiver:
    build: .
    container_name: ecg_mdns_receiver
    environment:
      - AVAHI_COMPAT_NOWARN=1
    restart: unless-stopped
    volumes:
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    networks:
      - heart-monitor-network
    ports:
      - "9000:9000"
      - "9443:9443"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

networks:
  heart-monitor-network:
    driver: bridge

volumes:
  portainer_data:
